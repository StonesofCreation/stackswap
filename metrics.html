<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>StackSwap — Stack Rankings</title>
<meta name="description" content="Real-time SaaS stack rankings. The most used, most cut, and most replaced tools — based on anonymous submissions. No vendor bias."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f0e13;color:#f0ece4;font-family:'DM Mono',monospace;min-height:100vh;
  background-image:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(255,200,87,0.07) 0%,transparent 60%)}
input,select,button{font-family:'DM Mono',monospace}
input::placeholder{color:rgba(255,255,255,0.25)}
select option{background:#1a1a22;color:#f0ece4}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

.wrap{max-width:740px;margin:0 auto;padding:40px 20px 80px}
.nav{display:flex;justify-content:flex-end;margin-bottom:20px}
.nav-btn{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:6px;padding:7px 14px;color:#7a7670;font-size:12px;cursor:pointer}
.nav-btn:hover{color:#f0ece4}
.header{text-align:center;margin-bottom:48px}
.badge{display:inline-flex;align-items:center;gap:8px;background:rgba(255,200,87,0.08);border:1px solid rgba(255,200,87,0.2);border-radius:20px;padding:5px 14px;margin-bottom:18px}
.bdot{width:6px;height:6px;border-radius:50%;background:#ffc857;animation:pulse 2s infinite}
.btxt{font-size:11px;letter-spacing:.15em;color:#ffc857;text-transform:uppercase}
h1{font-family:'Syne',sans-serif;font-size:clamp(34px,6vw,54px);font-weight:800;color:#f0ece4;letter-spacing:-.02em;margin-bottom:10px}
h1 .accent{color:#ffc857}
.sub{color:#7a7670;font-size:14px;line-height:1.6}

.card{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:24px;margin-bottom:14px}
.card-hd{display:flex;align-items:center;gap:10px;margin-bottom:18px}
.sdot{width:24px;height:24px;border-radius:50%;flex-shrink:0;background:rgba(255,200,87,0.15);border:1px solid rgba(255,200,87,0.4);display:flex;align-items:center;justify-content:center;font-size:11px;color:#ffc857;font-weight:700;transition:all .3s}
.sdot.done{background:#ffc857;color:#0f0e13}
.ct{font-size:14px;color:#f0ece4;font-weight:500}
.cs{font-size:12px;color:#5a5650;margin-top:2px}

.field{width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.12);border-radius:6px;padding:10px 14px;color:#f0ece4;font-size:14px;outline:none;transition:border-color .2s}
.field:focus{border-color:rgba(255,200,87,0.5)}
.lbl{display:block;font-size:11px;color:#5a5650;margin-bottom:6px;letter-spacing:.08em;text-transform:uppercase}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}

.tool-row{display:flex;gap:8px;margin-bottom:12px}
.tool-wrap{flex:1;position:relative}
.sugg{position:absolute;top:calc(100% + 4px);left:0;right:0;z-index:30;background:#1a1a22;border:1px solid rgba(255,200,87,0.25);border-radius:6px;overflow:hidden;display:none}
.sugg.show{display:block}
.si{padding:9px 14px;cursor:pointer;font-size:13px;color:#c8c4bc}
.si:hover{background:rgba(255,200,87,0.08)}
.sh{padding:6px 14px;font-size:10px;color:#3a3830;border-top:1px solid rgba(255,255,255,0.04)}
.add-btn{background:rgba(255,200,87,0.12);border:1px solid rgba(255,200,87,0.35);color:#ffc857;border-radius:6px;padding:10px 16px;cursor:pointer;font-size:13px;white-space:nowrap}
.add-btn:hover{background:rgba(255,200,87,0.2)}
.tags{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px;min-height:4px}
.tag{display:inline-flex;align-items:center;gap:6px;background:rgba(255,200,87,0.12);border:1px solid rgba(255,200,87,0.35);color:#ffc857;border-radius:4px;padding:4px 10px;font-size:13px}
.tag-x{background:none;border:none;cursor:pointer;color:#ffc857;font-size:16px;padding:0;line-height:1;opacity:.7}

.goals{display:flex;flex-wrap:wrap;gap:8px}
.gc{background:transparent;border:1px solid rgba(255,255,255,0.1);border-radius:4px;padding:7px 12px;cursor:pointer;color:#7a7670;font-size:12px;transition:all .2s}
.gc.on{background:rgba(255,200,87,0.12);border-color:rgba(255,200,87,0.5);color:#ffc857}

.cta{width:100%;padding:16px;background:rgba(255,255,255,0.06);border:none;border-radius:8px;cursor:not-allowed;color:#3a3830;font-size:15px;font-weight:700;font-family:'Syne',sans-serif;letter-spacing:.04em;transition:all .3s;display:flex;align-items:center;justify-content:center;gap:8px}
.cta.ready{background:linear-gradient(135deg,#ffc857,#ff9a3c);cursor:pointer;color:#0f0e13;box-shadow:0 0 40px rgba(255,200,87,.2)}
.spinner{width:14px;height:14px;border:2px solid rgba(0,0,0,.15);border-top:2px solid #0f0e13;border-radius:50%;animation:spin .7s linear infinite}

.result{display:none;background:rgba(255,255,255,0.015);border:1px solid rgba(255,200,87,.15);border-radius:14px;padding:24px 20px;margin-top:24px;animation:fadeUp .4s ease}
@media(min-width:480px){.result{padding:28px}}
.res-hd{display:flex;align-items:center;gap:10px;margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid rgba(255,255,255,.05)}
.res-glow{width:7px;height:7px;border-radius:50%;background:#ffc857;box-shadow:0 0 10px #ffc857;flex-shrink:0}
.res-lbl{font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:#ffc857}

/* Score */
.score-ring{display:flex;align-items:center;gap:16px;margin-bottom:24px;padding:16px;background:rgba(255,255,255,0.02);border-radius:10px}
.score-num{font-family:'Syne',sans-serif;font-size:48px;font-weight:800;line-height:1;flex-shrink:0}
.score-right{flex:1}
.score-sub{font-size:13px;color:#f0ece4;font-weight:500;margin-bottom:6px}
.score-desc{font-size:11px;color:#5a5650;line-height:1.5}
.health-bar{height:4px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden;margin-top:8px}
.health-fill{height:100%;border-radius:2px;transition:width 1s ease;width:0}

/* Section headers */
.sec{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:#5a5650;margin:22px 0 8px;font-weight:600;display:flex;align-items:center;gap:8px}
.sec::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.05)}

/* Consultant take */
.bp-box{background:rgba(255,200,87,0.04);border:1px solid rgba(255,200,87,.12);border-radius:8px;padding:12px 14px;margin-bottom:8px}
.bp-label{font-size:9px;color:#ffc857;letter-spacing:.12em;text-transform:uppercase;margin-bottom:4px;font-weight:600}
.bp-text{font-size:12px;color:#9a9690;line-height:1.6}

/* Finding cards */
.finding{border-radius:8px;padding:12px 14px;margin-bottom:8px;border:1px solid}
.finding-wrong{background:rgba(255,80,80,0.04);border-color:rgba(255,80,80,.15)}
.finding-opp{background:rgba(255,255,255,0.02);border-color:rgba(255,255,255,.06)}
.finding-missing{background:rgba(78,205,196,0.03);border-color:rgba(78,205,196,.12)}
.finding-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:5px}
.finding-left{flex:1;min-width:0}
.finding-title{font-size:13px;color:#f0ece4;font-weight:500;line-height:1.4;word-break:break-word}
.finding-title .cut{color:#ff9090}
.finding-title .arrow{color:#3a3830;margin:0 4px}
.finding-title .keep{color:#4ecdc4}
.finding-pill{flex-shrink:0;font-size:10px;font-weight:700;color:#ffc857;background:rgba(255,200,87,0.1);border:1px solid rgba(255,200,87,0.2);border-radius:20px;padding:3px 8px;white-space:nowrap;align-self:flex-start;margin-top:1px}
.finding-body{font-size:12px;color:#7a7670;line-height:1.6}

/* Savings */
.sav-box{background:rgba(255,200,87,.05);border:1px solid rgba(255,200,87,.15);border-radius:8px;padding:14px 16px;display:flex;gap:0;margin-bottom:8px}
.sav-item{flex:1;text-align:center;padding:4px 8px}
.sav-item+.sav-item{border-left:1px solid rgba(255,200,87,.1)}
.sav-val{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:#ffc857;line-height:1}
.sav-lbl{font-size:10px;color:#5a5650;margin-top:4px;text-transform:uppercase;letter-spacing:.06em}

/* Action steps */
.step{display:flex;gap:12px;margin-bottom:12px;align-items:flex-start}
.step-n{width:20px;height:20px;border-radius:50%;background:rgba(255,200,87,0.15);border:1px solid rgba(255,200,87,0.4);color:#ffc857;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.step-t{font-size:13px;color:#9a9690;line-height:1.65}
.step-title{color:#d4d0c8;font-weight:500;display:block;margin-bottom:3px;font-size:13px}

/* Dream stack */
.dream-box{background:rgba(255,200,87,0.03);border:1px solid rgba(255,200,87,.1);border-radius:8px;padding:14px 16px}
.dream-row{margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid rgba(255,255,255,.04)}
.dream-row:last-child{margin-bottom:0;padding-bottom:0;border-bottom:none}
.dream-size{font-size:9px;color:#ffc857;letter-spacing:.12em;text-transform:uppercase;margin-bottom:4px;font-weight:600}
.dream-text{font-size:12px;color:#9a9690;line-height:1.6}

/* Optimized stack */
.opt-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.opt-tag{background:rgba(78,205,196,.08);border:1px solid rgba(78,205,196,.2);color:#4ecdc4;border-radius:20px;padding:4px 10px;font-size:11px}

.no-issues{font-size:12px;color:#5a5650;line-height:1.6;padding:8px 0}
.red{color:#ff9090;font-weight:500}
.teal{color:#4ecdc4;font-weight:500}
.amber{color:#ffc857;font-weight:600}
.gray{color:#5a5650}

.mwrap{max-width:900px;margin:0 auto;padding:40px 20px 80px}
.back-btn{background:none;border:1px solid rgba(255,255,255,.12);border-radius:6px;color:#7a7670;padding:8px 16px;cursor:pointer;font-size:12px;margin-bottom:28px;font-family:'DM Mono',monospace}
.mh2{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:#f0ece4;margin-bottom:4px}
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:20px}
.bar-row{margin-bottom:10px}
.bar-lbl{display:flex;justify-content:space-between;margin-bottom:4px;font-size:12px}
.bar-track{height:3px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden}
.bar-fill{height:100%;border-radius:2px;width:0;transition:width .8s ease}

.footer{text-align:center;margin-top:52px;padding-top:20px;border-top:1px solid rgba(255,255,255,.04)}
.footer p{font-size:11px;color:#2e2c28;letter-spacing:.1em}

.field-wrap{margin-bottom:14px}
.field-hint{font-size:11px;color:#3a3830;margin-top:5px;line-height:1.4;font-style:italic}
.gate-submitted{display:flex;align-items:center;gap:10px;color:#ffc857;font-size:13px;padding:4px 0}
.gate-check{width:18px;height:18px;border-radius:50%;background:#ffc857;color:#0f0e13;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.unlock-btn{background:rgba(255,200,87,0.12);border:1px solid rgba(255,200,87,0.35);color:#ffc857;border-radius:6px;padding:12px;cursor:pointer;font-size:13px;font-weight:600;width:100%;margin-top:4px;transition:all .2s;font-family:"DM Mono",monospace;letter-spacing:.04em}
.unlock-btn:hover{background:rgba(255,200,87,0.22)}
.unlock-btn:disabled{opacity:.4;cursor:not-allowed}

@media(max-width:560px){.g2,.mgrid{grid-template-columns:1fr}}
</style>

  position:fixed;top:0;left:0;right:0;z-index:100;

}
.metrics-cta-bar-text{font-size:12px;color:#7a7670}
.metrics-cta-bar-text strong{color:#ffc857;font-weight:500}
.metrics-cta-btn{

</style>
</head>
<body>

<nav class="page-nav">
  <a href="index.html" class="page-nav-logo">Stack<span>Swap</span></a>
  <div class="page-nav-links">
    <a href="index.html" class="page-nav-link">Home</a>
    <a href="analyze.html" class="page-nav-link">Analyzer</a>
    <a href="metrics.html" class="page-nav-link active">Stack Rankings</a>
  </div>
</nav>

<div class="metrics-cta-bar">
  <span class="metrics-cta-bar-text">Rankings are based on <strong>anonymized stack submissions</strong>. No vendor has paid for placement.</span>
  <a href="analyze.html" class="metrics-cta-btn">Add Your Stack →</a>
</div>

<div id="app"></div>

<script>
// ── MINIMAL STATE FOR STANDALONE METRICS PAGE ─────────────────────────────────
// This page shows session data if navigated from the analyzer,
// or empty state with a prompt to run an analysis.
// Future: replace sessionMetrics with a fetch("/api/metrics") call.

let sessionMetrics = { from:[], cuts:[], recs:[], count:0, totalSavings:0, byIndustry:{} };

// Try to restore metrics from sessionStorage if coming from analyzer
try {
  const saved = sessionStorage.getItem("stackswap_metrics");
  if (saved) sessionMetrics = JSON.parse(saved);
} catch(e) {}

// ── DOM HELPERS ───────────────────────────────────────────────────────────────
function el(tag,cls,html){const e=document.createElement(tag);if(cls)e.className=cls;if(html!==undefined)e.innerHTML=html;return e;}
function div(cls,html){return el("div",cls,html);}
function span(cls,html){return el("span",cls,html);}
function app(){return document.getElementById("app");}

// ── METRICS PAGE ──────────────────────────────────────────────────────────────
function renderMetrics(filterIndustry) {
  app().innerHTML="";
  const wrap=div("mwrap");

  // Hero header
  const hero=div(null);
  hero.innerHTML=`
    <div style="margin-bottom:6px">
      <span style="font-family:'Syne',sans-serif;font-size:32px;font-weight:800;color:#f0ece4">Stack</span><span style="font-family:'Syne',sans-serif;font-size:32px;font-weight:800;color:#ffc857">Rankings</span>
    </div>
    <p style="color:#7a7670;font-size:13px;line-height:1.7;max-width:540px;margin-bottom:6px">
      Real data from real stacks. No vendor payments. No fake reviews. Just AI-analyzed patterns from every stack submitted to StackSwap.
    </p>
    <div style="display:flex;gap:20px;margin-top:16px;flex-wrap:wrap">
      <div style="text-align:center">
        <div style="font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:#ffc857">${sessionMetrics.count}</div>
        <div style="font-size:10px;color:#5a5650;text-transform:uppercase;letter-spacing:.1em">Stacks Analyzed</div>
      </div>
      <div style="text-align:center">
        <div style="font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:#4ecdc4">$${sessionMetrics.totalSavings.toLocaleString()}</div>
        <div style="font-size:10px;color:#5a5650;text-transform:uppercase;letter-spacing:.1em">Savings Identified</div>
      </div>
      <div style="text-align:center">
        <div style="font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:#ff9090">${sessionMetrics.cuts.length}</div>
        <div style="font-size:10px;color:#5a5650;text-transform:uppercase;letter-spacing:.1em">Tools Flagged</div>
      </div>
      <div style="text-align:center">
        <div style="font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:#c8c4bc">${Object.keys(sessionMetrics.byIndustry).length}</div>
        <div style="font-size:10px;color:#5a5650;text-transform:uppercase;letter-spacing:.1em">Industries</div>
      </div>
    </div>`;
  wrap.appendChild(hero);

  if(sessionMetrics.count===0){
    const empty=div("card");
    empty.style.cssText="text-align:center;padding:60px 24px;margin-top:32px";
    empty.innerHTML=`
      <div style="font-size:40px;margin-bottom:16px">📊</div>
      <div style="font-family:'Syne',sans-serif;font-size:18px;color:#f0ece4;margin-bottom:8px">No data yet</div>
      <div style="color:#5a5650;font-size:13px;line-height:1.6;margin-bottom:24px">Rankings populate from anonymized stack submissions.<br>Run your first analysis to contribute to the dataset.</div>
      <a href="analyze.html" style="display:inline-flex;align-items:center;gap:8px;background:#ffc857;color:#0f0e13;padding:12px 24px;border-radius:6px;font-size:13px;font-weight:700;font-family:'DM Mono',monospace;text-decoration:none;letter-spacing:.04em">Run Stack Analysis →</a>`;
    wrap.appendChild(empty);
    wrap.appendChild(div("footer",'<p>STACKSWAP — POWERED BY DEMANDSTACK</p>'));
    app().appendChild(wrap);
    return;
  }

  const freq=(arr,n=10)=>{const m={};arr.forEach(t=>{if(t)m[t]=(m[t]||0)+1;});return Object.entries(m).sort((a,b)=>b[1]-a[1]).slice(0,n);};

  const makeBarCard=(title,subtitle,items,color,pct=false)=>{
    const card=div("card");
    const max=items[0]?.[1]||1;
    const total=items.reduce((s,[,v])=>s+v,0);
    card.innerHTML=`<div style="margin-bottom:16px"><div style="font-size:11px;color:${color};letter-spacing:.12em;text-transform:uppercase;font-weight:600">${title}</div>${subtitle?`<div style="font-size:11px;color:#3a3830;margin-top:3px">${subtitle}</div>`:""}</div>`;
    items.forEach(([name,count],i)=>{
      const w=((count/max)*100).toFixed(0);
      const pctVal=((count/total)*100).toFixed(0);
      card.innerHTML+=`<div class="bar-row"><div class="bar-lbl"><span style="color:#d4d0c8;font-size:12px"><span style="color:${color};margin-right:6px;font-size:10px">${i+1}</span>${name}</span><span style="color:${color};font-weight:600;font-size:12px">${pct?pctVal+"% of stacks":count}</span></div><div class="bar-track"><div class="bar-fill" style="width:${w}%;background:${color}"></div></div></div>`;
    });
    return card;
  };

  const AI_SWAPS_PREVIEW = {
    "ZoomInfo":"Apollo.io","Drift":"HubSpot Chat","Marketo":"HubSpot Mktg Hub",
    "Pardot":"HubSpot Mktg Hub","Gong":"Avoma","Chorus":"Avoma",
    "Hootsuite":"Buffer","Sprout Social":"Buffer or Loomly",
    "Jasper":"Claude or ChatGPT","Copy.ai":"Claude or ChatGPT",
    "Hotjar":"Microsoft Clarity","FullStory":"Microsoft Clarity",
    "Tableau":"Power BI","Clari":"Gong Revenue","Docusign":"PandaDoc",
  };

  const industries=["All",...Object.keys(sessionMetrics.byIndustry).sort()];
  const active=filterIndustry||"All";

  const tabWrap=div(null);
  tabWrap.style.cssText="display:flex;flex-wrap:wrap;gap:8px;margin:28px 0 24px";
  industries.forEach(ind=>{
    const t=el("button",null,ind);
    const isActive=ind===active;
    t.style.cssText=`background:${isActive?"rgba(255,200,87,0.15)":"rgba(255,255,255,0.04)"};border:1px solid ${isActive?"rgba(255,200,87,0.5)":"rgba(255,255,255,0.1)"};border-radius:20px;padding:6px 14px;font-size:12px;color:${isActive?"#ffc857":"#7a7670"};cursor:pointer;font-family:'DM Mono',monospace`;
    t.addEventListener("click",()=>renderMetrics(ind==="All"?null:ind));
    tabWrap.appendChild(t);
  });
  wrap.appendChild(tabWrap);

  const ds=active==="All"?sessionMetrics:(sessionMetrics.byIndustry[active]||{tools:[],cuts:[],recs:[],count:0,savings:0});
  const dsTools=active==="All"?sessionMetrics.from:ds.tools;
  const dsCuts=active==="All"?sessionMetrics.cuts:ds.cuts;
  const dsRecs=active==="All"?sessionMetrics.recs:ds.recs;

  if(active!=="All"&&ds.count===0){
    wrap.appendChild(div("no-issues",`No data yet for ${active}. Run an analysis with this industry selected.`));
  } else {
    const secTitle1=div(null);
    secTitle1.innerHTML=`<div style="font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:#f0ece4;margin-bottom:4px">Top Stack${active!=="All"?" — "+active:""}</div><div style="font-size:12px;color:#5a5650;margin-bottom:16px">Most common tools in submitted stacks${active!=="All"?" for this industry":""}</div>`;
    wrap.appendChild(secTitle1);
    const g1=div("mgrid");
    g1.appendChild(makeBarCard("Most Used Tools","tools appearing most in submitted stacks",freq(dsTools,8),"#ffc857",true));
    g1.appendChild(makeBarCard("Rising Replacements","tools AI is recommending most often",freq(dsRecs,8),"#4ecdc4",true));
    wrap.appendChild(g1);

    const secTitle2=div(null);
    secTitle2.style.marginTop="32px";
    secTitle2.innerHTML=`<div style="font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:#f0ece4;margin-bottom:4px">The Exit List</div><div style="font-size:12px;color:#5a5650;margin-bottom:16px">Tools being flagged for removal most often — ranked by AI recommendation frequency</div>`;
    wrap.appendChild(secTitle2);
    const g2=div("mgrid");
    const cutFreq=freq(dsCuts,8);
    if(cutFreq.length){
      g2.appendChild(makeBarCard("Tools Being Cut","ranked by how often AI flags them for removal",cutFreq,"#ff6b6b",true));
      const repCard=div("card");
      repCard.innerHTML=`<div style="font-size:11px;color:#4ecdc4;letter-spacing:.12em;text-transform:uppercase;font-weight:600;margin-bottom:16px">What Replaces Them</div>`;
      cutFreq.forEach(([tool],i)=>{
        const rep=AI_SWAPS_PREVIEW[tool]||dsRecs[i]||"varies";
        repCard.innerHTML+=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;font-size:12px"><span style="color:#5a5650;width:14px;text-align:right">${i+1}</span><span style="color:#ff6b6b;flex:1">${tool}</span><span style="color:#3a3830">→</span><span style="color:#4ecdc4;flex:1.2">${rep}</span></div>`;
      });
      g2.appendChild(repCard);
    } else {
      g2.innerHTML=`<div style="color:#5a5650;font-size:13px;grid-column:1/-1">No cut data yet for this filter.</div>`;
    }
    wrap.appendChild(g2);

    if(active==="All"&&Object.keys(sessionMetrics.byIndustry).length>0){
      const secTitle3=div(null);
      secTitle3.style.marginTop="32px";
      secTitle3.innerHTML=`<div style="font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:#f0ece4;margin-bottom:4px">By Industry</div><div style="font-size:12px;color:#5a5650;margin-bottom:16px">Click any tab above to drill in</div>`;
      wrap.appendChild(secTitle3);
      const indGrid=div(null);
      indGrid.style.cssText="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px";
      Object.entries(sessionMetrics.byIndustry).sort((a,b)=>b[1].count-a[1].count).forEach(([ind,data])=>{
        const card=div("card");
        card.style.cssText="cursor:pointer;transition:border-color .2s";
        card.innerHTML=`<div style="font-size:12px;color:#ffc857;font-weight:600;margin-bottom:10px">${ind}</div>
          <div style="display:flex;justify-content:space-between;margin-bottom:6px"><span style="font-size:11px;color:#5a5650">Analyses</span><span style="font-size:12px;color:#f0ece4;font-weight:600">${data.count}</span></div>
          <div style="display:flex;justify-content:space-between;margin-bottom:6px"><span style="font-size:11px;color:#5a5650">Avg savings</span><span style="font-size:12px;color:#4ecdc4;font-weight:600">$${data.count?Math.round(data.savings/data.count).toLocaleString():0}/mo</span></div>
          <div style="display:flex;justify-content:space-between"><span style="font-size:11px;color:#5a5650">Top cut</span><span style="font-size:12px;color:#ff6b6b;font-weight:600">${freq(data.cuts,1)[0]?.[0]||"—"}</span></div>`;
        card.addEventListener("mouseenter",()=>card.style.borderColor="rgba(255,200,87,0.3)");
        card.addEventListener("mouseleave",()=>card.style.borderColor="");
        card.addEventListener("click",()=>renderMetrics(ind));
        indGrid.appendChild(card);
      });
      wrap.appendChild(indGrid);
    }
  }

  const disc=div(null);
  disc.style.cssText="margin-top:40px;padding:16px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.05);border-radius:8px";
  disc.innerHTML=`<div style="font-size:10px;color:#3a3830;line-height:1.7;letter-spacing:.04em">DATA METHODOLOGY — Rankings are derived from AI analysis of anonymized stack submissions. No vendor has paid for placement. No sponsored results. Recommendations are generated purely by pattern-matching tool overlaps, pricing data, and industry-specific best practices. Data updates in real time with every new analysis.</div>`;
  wrap.appendChild(disc);
  wrap.appendChild(div("footer",'<p>STACKSWAP — POWERED BY DEMANDSTACK</p>'));
  app().appendChild(wrap);
}

renderMetrics();
</script>
</body>
</html>
