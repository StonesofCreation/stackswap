// ── ANALYSIS ENGINE ───────────────────────────────────────────────────────────
function runAnalysis(tools, teamSize, industry, budget, goals) {
  const match = t => tools.some(u => u.toLowerCase().includes(t.toLowerCase()));
  const find  = t => tools.find(u => u.toLowerCase().includes(t.toLowerCase()));

  // 1. Find direct overlaps (existing logic)
  const overlaps = OVERLAPS.filter(o => match(o.a) && match(o.b));

  // 2. Find AI upgrades
  const upgrades = [];
  tools.forEach(tool => {
    const key = Object.keys(AI_SWAPS).find(k => tool.toLowerCase().includes(k.toLowerCase()));
    if (key && !upgrades.find(u=>u.tool===tool)) upgrades.push({tool, ...AI_SWAPS[key]});
  });

  // 3. CONSULTANT LAYER — industry-aware prescriptive analysis
  const bp = BLUEPRINTS[industry] || BLUEPRINTS["default"];
  const consultantFindings = []; // {type: "missing"|"wrong"|"redflag"|"dream", title, msg, save}

  if (bp !== BLUEPRINTS["default"]) {
    // Check red flags first (wrong tools for this industry)
    bp.redFlags.forEach(flag => {
      const hits = flag.trigger.filter(t => match(t));
      if (hits.length > 0) {
        consultantFindings.push({
          type: "wrong",
          title: `${hits.join(" + ")} — wrong tool for ${industry}`,
          msg: flag.msg,
          save: hits.length * 60
        });
      }
    });

    // Check core jobs — are they using the right tools?
    Object.entries(bp.coreJobs).forEach(([job, spec]) => {
      const hasBest = spec.best.some(b => match(b));
      const hasRedundant = (spec.redundantIf||[]).filter(r => match(r));

      if (!hasBest && hasRedundant.length > 0) {
        // They have the wrong tool for this job
        consultantFindings.push({
          type: "wrong_tool",
          title: `Wrong tool for: ${job}`,
          msg: `You're using ${hasRedundant.join(", ")} for ${job}, but ${spec.best[0]} is purpose-built for ${industry} teams and will do this better. ${spec.why}`,
          save: hasRedundant.length * 80,
          recommended: spec.best[0]
        });
      } else if (!hasBest) {
        // They're missing this job entirely — proactively suggest
        // Only suggest if they have enough other tools (likely a real business, not just testing)
        if (tools.length >= 3) {
          consultantFindings.push({
            type: "missing",
            title: `Consider: ${spec.best[0]} for ${job}`,
            msg: spec.why,
            save: 0
          });
        }
      } else if (hasBest && hasRedundant.length > 0) {
        // They have the right tool AND redundant tools
        consultantFindings.push({
          type: "redundant",
          title: `Cut ${hasRedundant.join(", ")} — already covered by ${spec.best.find(b=>match(b))}`,
          msg: spec.why,
          save: hasRedundant.length * 70
        });
      }
    });
  }

  // 4. Estimated spend
  let spend = budget ? parseInt(budget) : 0;
  if (!spend) tools.forEach(t => {
    const k = Object.keys(PRICING).find(k=>t.toLowerCase().includes(k.toLowerCase()));
    if (k) spend += PRICING[k];
  });

  // 5. Total savings (overlaps + AI swaps + consultant findings)
  const overlapSave = overlaps.reduce((s,o)=>s+o.save,0);
  const aiSave = upgrades.slice(0,3).reduce((s,u)=>s+u.save,0);
  const consultantSave = consultantFindings.filter(f=>f.type==="wrong"||f.type==="wrong_tool"||f.type==="redundant").reduce((s,f)=>s+f.save,0);
  const totalSave = overlapSave + aiSave + consultantSave;

  // 6. Score — now factors in consultant findings
  let score = 100;
  score -= overlaps.length * 8;
  score -= Math.min(upgrades.length * 3, 15);
  score -= consultantFindings.filter(f=>f.type==="wrong"||f.type==="wrong_tool").length * 12;
  score -= consultantFindings.filter(f=>f.type==="redundant").length * 6;
  if (tools.length > 15) score -= 8;
  if (tools.length > 20) score -= 8;
  score = Math.max(18, Math.min(96, score));

  // 7. Tools to remove
  const toRemove = new Set();
  overlaps.forEach(o => {
    const ta = find(o.a), tb = find(o.b);
    const pa = ta ? (PRICING[Object.keys(PRICING).find(k=>ta.toLowerCase().includes(k.toLowerCase()))]||50) : 50;
    const pb = tb ? (PRICING[Object.keys(PRICING).find(k=>tb.toLowerCase().includes(k.toLowerCase()))]||50) : 50;
    if (ta && tb) toRemove.add(pa > pb ? ta : tb);
  });
  // Also mark wrong-industry tools for removal
  consultantFindings.filter(f=>f.type==="wrong"||f.type==="wrong_tool").forEach(f => {
    tools.forEach(t => {
      const wrongTools = bp.redFlags.flatMap(r=>r.trigger).concat(
        Object.values(bp.coreJobs).flatMap(j=>j.redundantIf||[])
      );
      if (wrongTools.some(w=>t.toLowerCase().includes(w.toLowerCase()))) toRemove.add(t);
    });
  });

  const optimized = tools.filter(t=>!toRemove.has(t));
  // Add recommended tools to optimized stack
  const addToOptimized = [];
  consultantFindings.filter(f=>f.recommended).forEach(f => {
    if (!optimized.includes(f.recommended)) addToOptimized.push(f.recommended);
  });

  // 8. Build action plan (consultant-first ordering)
  const actions = [];
  const wrongTools = consultantFindings.filter(f=>f.type==="wrong"||f.type==="wrong_tool");
  const sortedOverlaps = [...overlaps].sort((a,b)=>b.save-a.save);
  const sortedUpgrades = [...upgrades].sort((a,b)=>b.save-a.save);

  // Highest priority: wrong-industry tools
  if (wrongTools.length > 0) {
    const top = wrongTools.sort((a,b)=>b.save-a.save)[0];
    actions.push({
      title: top.title,
      text: top.msg
    });
  }

  // Next: biggest overlap
  if (actions.length < 3 && sortedOverlaps.length > 0) {
    const top = sortedOverlaps[0];
    const tb = find(top.b);
    actions.push({title:`Cut ${tb||top.b}`, text:`${top.msg} Save $${top.save}/mo.`});
  }

  // Next: best AI swap
  if (actions.length < 3 && sortedUpgrades.length > 0) {
    const top = sortedUpgrades[0];
    actions.push({title:`Replace ${top.tool} with ${top.r}`, text:top.why+` Save ~$${top.save}/mo.`});
  }

  // Fallback
  if (actions.length < 3) {
    if (bp.dreamStack) {
      const sizeKey = parseInt(teamSize) > 20 ? "medium" : "small";
      const dream = bp.dreamStack[sizeKey] || bp.dreamStack[Object.keys(bp.dreamStack)[0]];
      if (dream) actions.push({title:"Your ideal stack", text: dream});
    }
    if (actions.length < 3) {
      actions.push({title:"Negotiate annual contracts", text:"With a leaner stack, renegotiate remaining tools on annual plans for 15–20% additional savings."});
    }
  }

  // Record to session metrics
  const recTools = [...addToOptimized, ...upgrades.slice(0,3).map(u=>u.r.split(" ")[0])];
  sessionMetrics.from.push(...tools);
  sessionMetrics.cuts.push(...[...toRemove]);
  sessionMetrics.recs.push(...recTools);
  sessionMetrics.count++;
  sessionMetrics.totalSavings += totalSave;
  // Persist to sessionStorage so metrics.html can read it
  try { sessionStorage.setItem("stackswap_metrics", JSON.stringify(sessionMetrics)); } catch(e) {}
  // Track by industry
  if (industry) {
    if (!sessionMetrics.byIndustry[industry]) {
      sessionMetrics.byIndustry[industry] = { tools:[], cuts:[], recs:[], count:0, savings:0 };
    }
    const ind = sessionMetrics.byIndustry[industry];
    ind.tools.push(...tools);
    ind.cuts.push(...[...toRemove]);
    ind.recs.push(...recTools);
    ind.count++;
    ind.savings += totalSave;
  }

  return {score, overlaps, upgrades, consultantFindings, totalSave, spend, optimized: [...optimized, ...addToOptimized], toRemove, actions, blueprint: bp};
}

// ── DOM HELPERS ───────────────────────────────────────────────────────────────
function el(tag, cls, html) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (html !== undefined) e.innerHTML = html;
  return e;
}
function div(cls, html) { return el("div", cls, html); }
function span(cls, html) { return el("span", cls, html); }
function txt(t) { return document.createTextNode(t); }
function app() { return document.getElementById("app"); }

function sdot(n) {
  const d = div("sdot"); d.id="sd"+n; d.textContent=n; return d;
}
function markDot(n, done) {
  const d = document.getElementById("sd"+n);
  if(!d) return;
  d.textContent = done ? "✓" : n;
  d.className = "sdot" + (done?" done":"");
}

  const label = r.score>=70?"Healthy Stack":r.score>=50?"Needs Attention":"Needs Work";
  const desc  = r.score>=70?"Your tools are well-chosen with minimal overlap."
               :r.score>=50?"There are real savings and upgrades on the table."
               :"You're likely overpaying and have significant overlap.";
  const ring = div("score-ring");

  sr.innerHTML=`<div class="score-sub">${label}</div><div class="score-desc">${desc}</div>`;
  const hbar=div("health-bar"); const hfill=div("health-fill");
  hfill.style.background=color; hbar.appendChild(hfill); sr.appendChild(hbar);
  ring.appendChild(sn); ring.appendChild(sr);
  box.appendChild(ring);
  setTimeout(()=>hfill.style.width=r.score+"%",120);

  // ── Consultant Take ──
  if (r.blueprint && r.blueprint.description && r.blueprint !== BLUEPRINTS["default"]) {
    const bp=div("bp-box");
    bp.innerHTML=`<div class="bp-label">Consultant Take</div><div class="bp-text">${r.blueprint.description}</div>`;
    box.appendChild(bp);
  }

  // ── Helper: render a finding card ──
  function findingCard(type, titleHtml, body, save) {
    const cls = type==="wrong"?"finding finding-wrong":type==="missing"?"finding finding-missing":"finding finding-opp";
    const card=div(cls);
    const top=div("finding-top");
    const left=div("finding-left");
    left.innerHTML=`<div class="finding-title">${titleHtml}</div>`;
    top.appendChild(left);
    if(save>0){
      const pill=div("finding-pill","$"+save+"/mo");
      top.appendChild(pill);
    }
    card.appendChild(top);
    if(body){const b=div("finding-body",body);card.appendChild(b);}
    return card;
  }

  // ── Wrong-industry tools ──
  const wrongFindings=(r.consultantFindings||[]).filter(f=>f.type==="wrong"||f.type==="wrong_tool");
  if(wrongFindings.length){
    box.appendChild(div("sec","Wrong tools for your industry"));
    wrongFindings.forEach(f=>box.appendChild(findingCard("wrong",f.title,f.msg,f.save)));
  }

  // ── Tool overlaps ──
  const redundantFindings=(r.consultantFindings||[]).filter(f=>f.type==="redundant");
  const hasOverlaps = r.overlaps.length||redundantFindings.length;
  box.appendChild(div("sec","Tool overlaps"));
  if(!hasOverlaps){
    box.appendChild(div("no-issues","No major overlaps detected — your tools serve distinct functions."));
  } else {
    redundantFindings.forEach(f=>box.appendChild(findingCard("opp",`<span class="cut">${f.title}</span>`,f.msg,f.save)));
    r.overlaps.forEach(o=>{
      const ta=selectedTools.find(t=>t.toLowerCase().includes(o.a.toLowerCase()))||o.a;
      const tb=selectedTools.find(t=>t.toLowerCase().includes(o.b.toLowerCase()))||o.b;
      box.appendChild(findingCard("opp",
        `Cut <span class="cut">${tb}</span><span class="arrow">→</span>Keep <span class="keep">${ta}</span>`,
        o.msg, o.save));
    });
  }

  // ── AI-native upgrades ──
  box.appendChild(div("sec","AI-native upgrades"));
  if(!r.upgrades.length){
    box.appendChild(div("no-issues","Your stack already includes modern AI-native tools."));
  } else {
    r.upgrades.slice(0,3).forEach(u=>box.appendChild(findingCard("opp",
      `Replace <span class="cut">${u.tool}</span><span class="arrow">→</span><span class="keep">${u.r}</span>`,
      u.why, u.save)));
  }

  // ── Gaps worth filling ──
  const missing=(r.consultantFindings||[]).filter(f=>f.type==="missing");
  if(missing.length){
    box.appendChild(div("sec","Gaps worth filling"));
    missing.forEach(f=>box.appendChild(findingCard("missing",
      `<span class="keep">${f.title}</span>`,f.msg,0)));
  }

  // ── Savings ──
  if(r.totalSave>0){
    box.appendChild(div("sec","Estimated savings"));
    const sb=div("sav-box");
    sb.innerHTML=`
      <div class="sav-item"><div class="sav-val">$${r.totalSave.toLocaleString()}</div><div class="sav-lbl">Per Month</div></div>
      <div class="sav-item"><div class="sav-val">$${(r.totalSave*12).toLocaleString()}</div><div class="sav-lbl">Per Year</div></div>`;
    box.appendChild(sb);
  }

  // ── Ideal stack ──
  if(r.blueprint&&r.blueprint.dreamStack&&Object.keys(r.blueprint.dreamStack).length){
    box.appendChild(div("sec","Ideal stack for your context"));
    const ds=div("dream-box");
    Object.entries(r.blueprint.dreamStack).forEach(([size,stack])=>{
      ds.innerHTML+=`<div class="dream-row"><div class="dream-size">${size} team</div><div class="dream-text">${stack}</div></div>`;
    });
    box.appendChild(ds);
  }

  // ── Action plan ──
  box.appendChild(div("sec","Priority actions"));
  r.actions.slice(0,3).forEach((a,i)=>{
    const step=div("step");
    const n=div("step-n",(i+1)+"");
    const t=div("step-t");
    t.innerHTML=`<span class="step-title">${a.title}</span>${a.text}`;
    step.appendChild(n); step.appendChild(t);
    box.appendChild(step);
  });

  // ── Optimized stack ──
  box.appendChild(div("sec","Your optimized stack"));
  const ot=div("opt-tags");
  r.optimized.forEach(t=>ot.appendChild(span("opt-tag",t)));
  box.appendChild(ot);

  box.scrollIntoView({behavior:"smooth",block:"start"});
}

function updateCTA(){
  const b=document.getElementById("cta"); if(!b)return;
  const hasTools=selectedTools.length>=2;
  const hasLead=leadData.submitted;
  const ok=hasTools&&hasLead;
  b.className="cta"+(ok?" ready":"");
  b.disabled=!ok;
  if(!hasTools) b.textContent="Add your tools above to continue";
  else if(!hasLead) b.textContent="Complete your info above to unlock";
  else b.textContent=`Analyze ${selectedTools.length} Tools`;
}

// ── METRICS PAGE ──────────────────────────────────────────────────────────────
function renderMetrics(filterIndustry) {
  app().innerHTML="";
  const wrap=div("mwrap");

  // Back button
  const back=el("button","back-btn","← Back to Analyzer");
  back.addEventListener("click",()=>{ window.location.href="analyze.html"; });
  wrap.appendChild(back);

  // Hero header
  const hero=div(null);
  hero.innerHTML=`
    <div style="margin-bottom:6px">
      <span style="font-family:'Syne',sans-serif;font-size:32px;font-weight:800;color:#f0ece4">Stack</span><span style="font-family:'Syne',sans-serif;font-size:32px;font-weight:800;color:#ffc857">Rankings</span>
    </div>
    <p style="color:#7a7670;font-size:13px;line-height:1.7;max-width:540px;margin-bottom:6px">
      Real data from real stacks. No vendor payments. No fake reviews. Just AI-analyzed patterns from every stack submitted to StackSwap.
    </p>
    <div style="display:flex;gap:20px;margin-top:16px;flex-wrap:wrap">
      <div style="text-align:center">
        <div style="font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:#ffc857">${sessionMetrics.count}</div>
        <div style="font-size:10px;color:#5a5650;text-transform:uppercase;letter-spacing:.1em">Stacks Analyzed</div>
      </div>
      <div style="text-align:center">
        <div style="font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:#4ecdc4">$${sessionMetrics.totalSavings.toLocaleString()}</div>
        <div style="font-size:10px;color:#5a5650;text-transform:uppercase;letter-spacing:.1em">Savings Identified</div>
      </div>
      <div style="text-align:center">
        <div style="font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:#ff9090">${sessionMetrics.cuts.length}</div>
        <div style="font-size:10px;color:#5a5650;text-transform:uppercase;letter-spacing:.1em">Tools Flagged</div>
      </div>
      <div style="text-align:center">
        <div style="font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:#c8c4bc">${Object.keys(sessionMetrics.byIndustry).length}</div>
        <div style="font-size:10px;color:#5a5650;text-transform:uppercase;letter-spacing:.1em">Industries</div>
      </div>
    </div>`;
  wrap.appendChild(hero);

  if(sessionMetrics.count===0){
    const empty=div("card");
    empty.style.cssText="text-align:center;padding:60px 24px;margin-top:32px";
    empty.innerHTML=`<div style="font-size:40px;margin-bottom:16px">📊</div>
      <div style="font-family:'Syne',sans-serif;font-size:18px;color:#f0ece4;margin-bottom:8px">No data yet</div>
      <div style="color:#5a5650;font-size:13px;line-height:1.6">Run your first stack analysis to start building the rankings.<br>Every submission makes the data more valuable.</div>`;
    wrap.appendChild(empty);
    wrap.appendChild(div("footer",'<p>STACKSWAP — POWERED BY DEMANDSTACK</p>'));
    app().appendChild(wrap);
    return;
  }

  // ── Helper: frequency map ──
  const freq=(arr,n=10)=>{
    const m={};
    arr.forEach(t=>{if(t)m[t]=(m[t]||0)+1;});
    return Object.entries(m).sort((a,b)=>b[1]-a[1]).slice(0,n);
  };

  // ── Helper: render a bar chart card ──
  const makeBarCard=(title,subtitle,items,color,pct=false)=>{
    const card=div("card");
    const max=items[0]?.[1]||1;
    const total=items.reduce((s,[,v])=>s+v,0);
    card.innerHTML=`
      <div style="margin-bottom:16px">
        <div style="font-size:11px;color:${color};letter-spacing:.12em;text-transform:uppercase;font-weight:600">${title}</div>
        ${subtitle?`<div style="font-size:11px;color:#3a3830;margin-top:3px">${subtitle}</div>`:""}
      </div>`;
    items.forEach(([name,count],i)=>{
      const w=((count/max)*100).toFixed(0);
      const pctVal=((count/total)*100).toFixed(0);
      card.innerHTML+=`
        <div class="bar-row">
          <div class="bar-lbl">
            <span style="color:#d4d0c8;font-size:12px"><span style="color:${color};margin-right:6px;font-size:10px">${i+1}</span>${name}</span>
            <span style="color:${color};font-weight:600;font-size:12px">${pct?pctVal+"% of stacks":count}</span>
          </div>
          <div class="bar-track"><div class="bar-fill" style="width:${w}%;background:${color}"></div></div>
        </div>`;
    });
    return card;
  };

  // ── Industry filter tabs ──
  const industries=["All",...Object.keys(sessionMetrics.byIndustry).sort()];
  const active=filterIndustry||"All";

  const tabWrap=div(null);
  tabWrap.style.cssText="display:flex;flex-wrap:wrap;gap:8px;margin:28px 0 24px";
  industries.forEach(ind=>{
    const t=el("button",null,ind);
    const isActive=ind===active;
    t.style.cssText=`background:${isActive?"rgba(255,200,87,0.15)":"rgba(255,255,255,0.04)"};border:1px solid ${isActive?"rgba(255,200,87,0.5)":"rgba(255,255,255,0.1)"};border-radius:20px;padding:6px 14px;font-size:12px;color:${isActive?"#ffc857":"#7a7670"};cursor:pointer;font-family:'DM Mono',monospace`;
    t.addEventListener("click",()=>renderMetrics(ind==="All"?null:ind));
    tabWrap.appendChild(t);
  });
  wrap.appendChild(tabWrap);

  // Get the data set based on active filter
  const ds = active==="All" ? sessionMetrics : (sessionMetrics.byIndustry[active]||{tools:[],cuts:[],recs:[],count:0,savings:0});
  const dsTools = active==="All" ? sessionMetrics.from : ds.tools;
  const dsCuts  = active==="All" ? sessionMetrics.cuts  : ds.cuts;
  const dsRecs  = active==="All" ? sessionMetrics.recs  : ds.recs;

  if(active!=="All"&&ds.count===0){
    wrap.appendChild(div("no-issues",`No data yet for ${active}. Run an analysis with this industry selected.`));
  } else {

    // ── Section: Top Stack by Industry ──
    const secTitle1=div(null);
    secTitle1.innerHTML=`<div style="font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:#f0ece4;margin-bottom:4px">Top Stack${active!=="All"?" — "+active:""}</div><div style="font-size:12px;color:#5a5650;margin-bottom:16px">The most common tools found in submitted stacks${active!=="All"?" for this industry":""}</div>`;
    wrap.appendChild(secTitle1);
    const g1=div("mgrid");
    g1.appendChild(makeBarCard("Most Used Tools","tools appearing most in submitted stacks",freq(dsTools,8),"#ffc857",true));
    g1.appendChild(makeBarCard("✅ Rising Replacements","tools AI is recommending most often",freq(dsRecs,8),"#4ecdc4",true));
    wrap.appendChild(g1);

    // ── Section: The Exit List ──
    const secTitle2=div(null);
    secTitle2.style.marginTop="32px";
    secTitle2.innerHTML=`<div style="font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:#f0ece4;margin-bottom:4px">The Exit List</div><div style="font-size:12px;color:#5a5650;margin-bottom:16px">Tools people are being told to cut most often — ranked by AI recommendation frequency</div>`;
    wrap.appendChild(secTitle2);
    const g2=div("mgrid");
    const cutFreq=freq(dsCuts,8);
    if(cutFreq.length){
      g2.appendChild(makeBarCard("🔴 Tools Being Cut","ranked by how often AI flags them for removal",cutFreq,"#ff6b6b",true));
      // Replacement map: for each cut tool, what replaces it most?
      const repMap={};
      // Build from AI_SWAPS knowledge
      cutFreq.forEach(([tool])=>{
        const key=Object.keys(AI_SWAPS).find(k=>tool.toLowerCase().includes(k.toLowerCase()));
        if(key) repMap[tool]=AI_SWAPS[key].r;
      });
      const repCard=div("card");
      repCard.innerHTML=`<div style="font-size:11px;color:#4ecdc4;letter-spacing:.12em;text-transform:uppercase;font-weight:600;margin-bottom:16px">What Replaces Them</div>`;
      cutFreq.forEach(([tool],i)=>{
        const rep=repMap[tool];
        repCard.innerHTML+=`
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;font-size:12px">
            <span style="color:#5a5650;width:14px;text-align:right">${i+1}</span>
            <span style="color:#ff6b6b;flex:1">${tool}</span>
            <span style="color:#3a3830">→</span>
            <span style="color:#4ecdc4;flex:1.2">${rep||"varies"}</span>
          </div>`;
      });
      g2.appendChild(repCard);
    } else {
      g2.innerHTML=`<div style="color:#5a5650;font-size:13px;grid-column:1/-1">No cut data yet for this filter.</div>`;
    }
    wrap.appendChild(g2);

    // ── Section: Industry Breakdown (only on All view) ──
    if(active==="All"&&Object.keys(sessionMetrics.byIndustry).length>0){
      const secTitle3=div(null);
      secTitle3.style.marginTop="32px";
      secTitle3.innerHTML=`<div style="font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:#f0ece4;margin-bottom:4px">By Industry</div><div style="font-size:12px;color:#5a5650;margin-bottom:16px">Click any industry tab above to drill in</div>`;
      wrap.appendChild(secTitle3);
      const indGrid=div(null);
      indGrid.style.cssText="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px";
      Object.entries(sessionMetrics.byIndustry).sort((a,b)=>b[1].count-a[1].count).forEach(([ind,data])=>{
        const card=div("card");
        card.style.cssText="cursor:pointer;transition:border-color .2s";
        card.innerHTML=`
          <div style="font-size:12px;color:#ffc857;font-weight:600;margin-bottom:10px">${ind}</div>
          <div style="display:flex;justify-content:space-between;margin-bottom:6px">
            <span style="font-size:11px;color:#5a5650">Analyses</span>
            <span style="font-size:12px;color:#f0ece4;font-weight:600">${data.count}</span>
          </div>
          <div style="display:flex;justify-content:space-between;margin-bottom:6px">
            <span style="font-size:11px;color:#5a5650">Avg savings</span>
            <span style="font-size:12px;color:#4ecdc4;font-weight:600">$${data.count?Math.round(data.savings/data.count).toLocaleString():0}/mo</span>
          </div>
          <div style="display:flex;justify-content:space-between">
            <span style="font-size:11px;color:#5a5650">Top cut</span>
            <span style="font-size:12px;color:#ff6b6b;font-weight:600">${freq(data.cuts,1)[0]?.[0]||"—"}</span>
          </div>`;
        card.addEventListener("mouseenter",()=>card.style.borderColor="rgba(255,200,87,0.3)");
        card.addEventListener("mouseleave",()=>card.style.borderColor="");
        card.addEventListener("click",()=>renderMetrics(ind));
        indGrid.appendChild(card);
      });
      wrap.appendChild(indGrid);
    }
  }

  // ── Disclaimer ──
  const disc=div(null);
  disc.style.cssText="margin-top:40px;padding:16px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.05);border-radius:8px";
  disc.innerHTML=`<div style="font-size:10px;color:#3a3830;line-height:1.7;letter-spacing:.04em">DATA METHODOLOGY — Rankings are derived from AI analysis of anonymized stack submissions. No vendor has paid for placement. No sponsored results. Recommendations are generated purely by pattern-matching tool overlaps, pricing data, and industry-specific best practices. Data updates in real time with every new analysis.</div>`;
  wrap.appendChild(disc);

  wrap.appendChild(div("footer",'<p>STACKSWAP — POWERED BY DEMANDSTACK</p>'));
  app().appendChild(wrap);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
renderMain();
</script>
