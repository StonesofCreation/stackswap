<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>StackSwap</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f0e13;color:#f0ece4;font-family:'DM Mono',monospace;min-height:100vh;
  background-image:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(255,200,87,0.07) 0%,transparent 60%)}
input,select,button{font-family:'DM Mono',monospace}
input::placeholder{color:rgba(255,255,255,0.25)}
select option{background:#1a1a22;color:#f0ece4}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

.wrap{max-width:740px;margin:0 auto;padding:40px 20px 80px}
.nav{display:flex;justify-content:flex-end;margin-bottom:20px}
.nav-btn{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:6px;padding:7px 14px;color:#7a7670;font-size:12px;cursor:pointer}
.nav-btn:hover{color:#f0ece4}
.header{text-align:center;margin-bottom:48px}
.badge{display:inline-flex;align-items:center;gap:8px;background:rgba(255,200,87,0.08);border:1px solid rgba(255,200,87,0.2);border-radius:20px;padding:5px 14px;margin-bottom:18px}
.bdot{width:6px;height:6px;border-radius:50%;background:#ffc857;animation:pulse 2s infinite}
.btxt{font-size:11px;letter-spacing:.15em;color:#ffc857;text-transform:uppercase}
h1{font-family:'Syne',sans-serif;font-size:clamp(34px,6vw,54px);font-weight:800;color:#f0ece4;letter-spacing:-.02em;margin-bottom:10px}
h1 .accent{color:#ffc857}
.sub{color:#7a7670;font-size:14px;line-height:1.6}

.card{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:24px;margin-bottom:14px}
.card-hd{display:flex;align-items:center;gap:10px;margin-bottom:18px}
.sdot{width:24px;height:24px;border-radius:50%;flex-shrink:0;background:rgba(255,200,87,0.15);border:1px solid rgba(255,200,87,0.4);display:flex;align-items:center;justify-content:center;font-size:11px;color:#ffc857;font-weight:700;transition:all .3s}
.sdot.done{background:#ffc857;color:#0f0e13}
.ct{font-size:14px;color:#f0ece4;font-weight:500}
.cs{font-size:12px;color:#5a5650;margin-top:2px}

.field{width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.12);border-radius:6px;padding:10px 14px;color:#f0ece4;font-size:14px;outline:none;transition:border-color .2s}
.field:focus{border-color:rgba(255,200,87,0.5)}
.lbl{display:block;font-size:11px;color:#5a5650;margin-bottom:6px;letter-spacing:.08em;text-transform:uppercase}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}

.tool-row{display:flex;gap:8px;margin-bottom:12px}
.tool-wrap{flex:1;position:relative}
.sugg{position:absolute;top:calc(100% + 4px);left:0;right:0;z-index:30;background:#1a1a22;border:1px solid rgba(255,200,87,0.25);border-radius:6px;overflow:hidden;display:none}
.sugg.show{display:block}
.si{padding:9px 14px;cursor:pointer;font-size:13px;color:#c8c4bc}
.si:hover{background:rgba(255,200,87,0.08)}
.sh{padding:6px 14px;font-size:10px;color:#3a3830;border-top:1px solid rgba(255,255,255,0.04)}
.add-btn{background:rgba(255,200,87,0.12);border:1px solid rgba(255,200,87,0.35);color:#ffc857;border-radius:6px;padding:10px 16px;cursor:pointer;font-size:13px;white-space:nowrap}
.add-btn:hover{background:rgba(255,200,87,0.2)}
.tags{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px;min-height:4px}
.tag{display:inline-flex;align-items:center;gap:6px;background:rgba(255,200,87,0.12);border:1px solid rgba(255,200,87,0.35);color:#ffc857;border-radius:4px;padding:4px 10px;font-size:13px}
.tag-x{background:none;border:none;cursor:pointer;color:#ffc857;font-size:16px;padding:0;line-height:1;opacity:.7}

.goals{display:flex;flex-wrap:wrap;gap:8px}
.gc{background:transparent;border:1px solid rgba(255,255,255,0.1);border-radius:4px;padding:7px 12px;cursor:pointer;color:#7a7670;font-size:12px;transition:all .2s}
.gc.on{background:rgba(255,200,87,0.12);border-color:rgba(255,200,87,0.5);color:#ffc857}

.cta{width:100%;padding:16px;background:rgba(255,255,255,0.06);border:none;border-radius:8px;cursor:not-allowed;color:#3a3830;font-size:15px;font-weight:700;font-family:'Syne',sans-serif;letter-spacing:.04em;transition:all .3s;display:flex;align-items:center;justify-content:center;gap:8px}
.cta.ready{background:linear-gradient(135deg,#ffc857,#ff9a3c);cursor:pointer;color:#0f0e13;box-shadow:0 0 40px rgba(255,200,87,.2)}
.spinner{width:14px;height:14px;border:2px solid rgba(0,0,0,.15);border-top:2px solid #0f0e13;border-radius:50%;animation:spin .7s linear infinite}

.result{display:none;background:rgba(255,255,255,0.02);border:1px solid rgba(255,200,87,.2);border-radius:12px;padding:28px;margin-top:24px;animation:fadeUp .4s ease}
.res-hd{display:flex;align-items:center;gap:10px;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid rgba(255,255,255,.06)}
.res-glow{width:8px;height:8px;border-radius:50%;background:#ffc857;box-shadow:0 0 12px #ffc857}
.res-lbl{font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:#ffc857}

.score-ring{text-align:center;margin-bottom:28px}
.score-num{font-family:'Syne',sans-serif;font-size:72px;font-weight:800;line-height:1}
.score-sub{font-size:12px;color:#7a7670;margin-top:6px;letter-spacing:.08em;text-transform:uppercase}
.health-bar{height:6px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden;margin:10px auto 0;max-width:200px}
.health-fill{height:100%;border-radius:4px;transition:width 1s ease;width:0}

.sec{color:#ffc857;font-size:11px;letter-spacing:.14em;text-transform:uppercase;margin:24px 0 10px;font-weight:600;border-bottom:1px solid rgba(255,200,87,.1);padding-bottom:6px}

.alert{background:rgba(255,100,100,.06);border:1px solid rgba(255,100,100,.2);border-radius:8px;padding:14px;margin-bottom:8px}
.alert-lbl{font-size:10px;color:#ff9090;letter-spacing:.08em;text-transform:uppercase;margin-bottom:5px}
.alert-row{display:flex;align-items:center;flex-wrap:wrap;gap:4px;margin-bottom:6px;font-size:13px}
.red{color:#ff9090;font-weight:500}
.teal{color:#4ecdc4;font-weight:500}
.amber{color:#ffc857;font-weight:600;font-size:12px}
.gray{color:#7a7670}
.alert-msg{font-size:12px;color:#9a9690;line-height:1.5}

.opp{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,.07);border-radius:8px;padding:14px;margin-bottom:8px}
.opp-row{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.opp-left{display:flex;align-items:center;flex-wrap:wrap;gap:4px;font-size:13px}
.opp-msg{font-size:12px;color:#7a7670;line-height:1.5}

.sav-box{background:rgba(255,200,87,.06);border:1px solid rgba(255,200,87,.2);border-radius:8px;padding:16px;display:flex;justify-content:space-around;text-align:center;margin-bottom:8px}
.sav-val{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:#ffc857}
.sav-lbl{font-size:11px;color:#7a7670;margin-top:4px;text-transform:uppercase;letter-spacing:.06em}

.step{display:flex;gap:12px;margin-bottom:10px;align-items:flex-start}
.step-n{width:22px;height:22px;border-radius:50%;background:#ffc857;color:#0f0e13;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.step-t{font-size:13px;color:#c8c4bc;line-height:1.6}
.step-title{color:#f0ece4;font-weight:500;display:block;margin-bottom:2px}

.opt-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.opt-tag{background:rgba(78,205,196,.1);border:1px solid rgba(78,205,196,.25);color:#4ecdc4;border-radius:4px;padding:3px 10px;font-size:12px}

.no-issues{font-size:13px;color:#7a7670;line-height:1.6}

.mwrap{max-width:900px;margin:0 auto;padding:40px 20px 80px}
.back-btn{background:none;border:1px solid rgba(255,255,255,.12);border-radius:6px;color:#7a7670;padding:8px 16px;cursor:pointer;font-size:12px;margin-bottom:28px;font-family:'DM Mono',monospace}
.mh2{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:#f0ece4;margin-bottom:4px}
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:20px}
.bar-row{margin-bottom:10px}
.bar-lbl{display:flex;justify-content:space-between;margin-bottom:4px;font-size:12px}
.bar-track{height:3px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden}
.bar-fill{height:100%;border-radius:2px;width:0;transition:width .8s ease}

.footer{text-align:center;margin-top:52px;padding-top:20px;border-top:1px solid rgba(255,255,255,.04)}
.footer p{font-size:11px;color:#2e2c28;letter-spacing:.1em}

@media(max-width:560px){.g2,.mgrid{grid-template-columns:1fr}}
</style>
</head>

// ── ANALYSIS ENGINE ───────────────────────────────────────────────────────────
function runAnalysis(tools, teamSize, industry, budget, goals) {
  const match = t => tools.some(u => u.toLowerCase().includes(t.toLowerCase()));
  const find  = t => tools.find(u => u.toLowerCase().includes(t.toLowerCase()));

  // 1. Find direct overlaps (existing logic)
  const overlaps = OVERLAPS.filter(o => match(o.a) && match(o.b));

  // 2. Find AI upgrades
  const upgrades = [];
  tools.forEach(tool => {
    const key = Object.keys(AI_SWAPS).find(k => tool.toLowerCase().includes(k.toLowerCase()));
    if (key && !upgrades.find(u=>u.tool===tool)) upgrades.push({tool, ...AI_SWAPS[key]});
  });

  // 3. CONSULTANT LAYER — industry-aware prescriptive analysis
  const bp = BLUEPRINTS[industry] || BLUEPRINTS["default"];
  const consultantFindings = []; // {type: "missing"|"wrong"|"redflag"|"dream", title, msg, save}

  if (bp !== BLUEPRINTS["default"]) {
    // Check red flags first (wrong tools for this industry)
    bp.redFlags.forEach(flag => {
      const hits = flag.trigger.filter(t => match(t));
      if (hits.length > 0) {
        consultantFindings.push({
          type: "wrong",
          title: `${hits.join(" + ")} — wrong tool for ${industry}`,
          msg: flag.msg,
          save: hits.length * 60
        });
      }
    });

    // Check core jobs — are they using the right tools?
    Object.entries(bp.coreJobs).forEach(([job, spec]) => {
      const hasBest = spec.best.some(b => match(b));
      const hasRedundant = (spec.redundantIf||[]).filter(r => match(r));

      if (!hasBest && hasRedundant.length > 0) {
        // They have the wrong tool for this job
        consultantFindings.push({
          type: "wrong_tool",
          title: `Wrong tool for: ${job}`,
          msg: `You're using ${hasRedundant.join(", ")} for ${job}, but ${spec.best[0]} is purpose-built for ${industry} teams and will do this better. ${spec.why}`,
          save: hasRedundant.length * 80,
          recommended: spec.best[0]
        });
      } else if (!hasBest) {
        // They're missing this job entirely — proactively suggest
        // Only suggest if they have enough other tools (likely a real business, not just testing)
        if (tools.length >= 3) {
          consultantFindings.push({
            type: "missing",
            title: `Consider: ${spec.best[0]} for ${job}`,
            msg: spec.why,
            save: 0
          });
        }
      } else if (hasBest && hasRedundant.length > 0) {
        // They have the right tool AND redundant tools
        consultantFindings.push({
          type: "redundant",
          title: `Cut ${hasRedundant.join(", ")} — already covered by ${spec.best.find(b=>match(b))}`,
          msg: spec.why,
          save: hasRedundant.length * 70
        });
      }
    });
  }

  // 4. Estimated spend
  let spend = budget ? parseInt(budget) : 0;
  if (!spend) tools.forEach(t => {
    const k = Object.keys(PRICING).find(k=>t.toLowerCase().includes(k.toLowerCase()));
    if (k) spend += PRICING[k];
  });

  // 5. Total savings (overlaps + AI swaps + consultant findings)
  const overlapSave = overlaps.reduce((s,o)=>s+o.save,0);
  const aiSave = upgrades.slice(0,3).reduce((s,u)=>s+u.save,0);
  const consultantSave = consultantFindings.filter(f=>f.type==="wrong"||f.type==="wrong_tool"||f.type==="redundant").reduce((s,f)=>s+f.save,0);
  const totalSave = overlapSave + aiSave + consultantSave;

  // 6. Score — now factors in consultant findings
  let score = 100;
  score -= overlaps.length * 8;
  score -= Math.min(upgrades.length * 3, 15);
  score -= consultantFindings.filter(f=>f.type==="wrong"||f.type==="wrong_tool").length * 12;
  score -= consultantFindings.filter(f=>f.type==="redundant").length * 6;
  if (tools.length > 15) score -= 8;
  if (tools.length > 20) score -= 8;
  score = Math.max(18, Math.min(96, score));

  // 7. Tools to remove
  const toRemove = new Set();
  overlaps.forEach(o => {
    const ta = find(o.a), tb = find(o.b);
    const pa = ta ? (PRICING[Object.keys(PRICING).find(k=>ta.toLowerCase().includes(k.toLowerCase()))]||50) : 50;
    const pb = tb ? (PRICING[Object.keys(PRICING).find(k=>tb.toLowerCase().includes(k.toLowerCase()))]||50) : 50;
    if (ta && tb) toRemove.add(pa > pb ? ta : tb);
  });
  // Also mark wrong-industry tools for removal
  consultantFindings.filter(f=>f.type==="wrong"||f.type==="wrong_tool").forEach(f => {
    tools.forEach(t => {
      const wrongTools = bp.redFlags.flatMap(r=>r.trigger).concat(
        Object.values(bp.coreJobs).flatMap(j=>j.redundantIf||[])
      );
      if (wrongTools.some(w=>t.toLowerCase().includes(w.toLowerCase()))) toRemove.add(t);
    });
  });

  const optimized = tools.filter(t=>!toRemove.has(t));
  // Add recommended tools to optimized stack
  const addToOptimized = [];
  consultantFindings.filter(f=>f.recommended).forEach(f => {
    if (!optimized.includes(f.recommended)) addToOptimized.push(f.recommended);
  });

  // 8. Build action plan (consultant-first ordering)
  const actions = [];
  const wrongTools = consultantFindings.filter(f=>f.type==="wrong"||f.type==="wrong_tool");
  const sortedOverlaps = [...overlaps].sort((a,b)=>b.save-a.save);
  const sortedUpgrades = [...upgrades].sort((a,b)=>b.save-a.save);

  // Highest priority: wrong-industry tools
  if (wrongTools.length > 0) {
    const top = wrongTools.sort((a,b)=>b.save-a.save)[0];
    actions.push({
      title: top.title,
      text: top.msg
    });
  }

  // Next: biggest overlap
  if (actions.length < 3 && sortedOverlaps.length > 0) {
    const top = sortedOverlaps[0];
    const tb = find(top.b);
    actions.push({title:`Cut ${tb||top.b}`, text:`${top.msg} Save $${top.save}/mo.`});
  }

  // Next: best AI swap
  if (actions.length < 3 && sortedUpgrades.length > 0) {
    const top = sortedUpgrades[0];
    actions.push({title:`Replace ${top.tool} with ${top.r}`, text:top.why+` Save ~$${top.save}/mo.`});
  }

  // Fallback
  if (actions.length < 3) {
    if (bp.dreamStack) {
      const sizeKey = parseInt(teamSize) > 20 ? "medium" : "small";
      const dream = bp.dreamStack[sizeKey] || bp.dreamStack[Object.keys(bp.dreamStack)[0]];
      if (dream) actions.push({title:"Your ideal stack", text: dream});
    }
    if (actions.length < 3) {
      actions.push({title:"Negotiate annual contracts", text:"With a leaner stack, renegotiate remaining tools on annual plans for 15–20% additional savings."});
    }
  }

  // Record to session metrics
  sessionMetrics.from.push(...tools);
  sessionMetrics.cuts.push(...[...toRemove]);
  sessionMetrics.recs.push(...addToOptimized, ...upgrades.slice(0,3).map(u=>u.r.split(" ")[0]));
  sessionMetrics.count++;
  sessionMetrics.totalSavings += totalSave;

  return {score, overlaps, upgrades, consultantFindings, totalSave, spend, optimized: [...optimized, ...addToOptimized], toRemove, actions, blueprint: bp};
}

// ── DOM HELPERS ───────────────────────────────────────────────────────────────
function el(tag, cls, html) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (html !== undefined) e.innerHTML = html;
  return e;
}
function div(cls, html) { return el("div", cls, html); }
function span(cls, html) { return el("span", cls, html); }
function txt(t) { return document.createTextNode(t); }
function app() { return document.getElementById("app"); }

function sdot(n) {
  const d = div("sdot"); d.id="sd"+n; d.textContent=n; return d;
}
function markDot(n, done) {
  const d = document.getElementById("sd"+n);
  if(!d) return;
  d.textContent = done ? "✓" : n;
  d.className = "sdot" + (done?" done":"");
}

function renderResult(r) {
  const box = document.getElementById("result-box");
  box.innerHTML = "";
  box.style.display = "block";

  // Header
  const hd = div("res-hd");
  hd.appendChild(div("res-glow"));
  hd.appendChild(span("res-lbl","Stack Analysis Complete"));
  box.appendChild(hd);

  // Score
  const color = r.score>=70?"#4ecdc4":r.score>=50?"#ffc857":"#ff6b6b";
  const label = r.score>=70?"Healthy":r.score>=50?"Needs Work":"Bloated";
  const ring = div("score-ring");
  const sn = div("score-num", r.score+""); sn.style.color=color;
  ring.appendChild(sn);
  ring.appendChild(div("score-sub", label + " Stack"));
  const hbar = div("health-bar"); const hfill = div("health-fill");
  hfill.style.background=color; hbar.appendChild(hfill);
  ring.appendChild(hbar);
  box.appendChild(ring);
  setTimeout(()=>hfill.style.width=r.score+"%",100);

  // Blueprint context (if industry-specific)
  if (r.blueprint && r.blueprint.description && r.blueprint !== BLUEPRINTS["default"]) {
    const bpBox = div("alert");
    bpBox.style.cssText="background:rgba(255,200,87,0.05);border-color:rgba(255,200,87,0.2);margin-bottom:8px";
    bpBox.innerHTML=`<div class="alert-lbl" style="color:#ffc857">Consultant Take</div><div class="alert-msg" style="color:#c8c4bc">${r.blueprint.description}</div>`;
    box.appendChild(bpBox);
  }

  // CONSULTANT FINDINGS — wrong-industry and wrong-tool flags (highest priority)
  const wrongFindings = (r.consultantFindings||[]).filter(f=>f.type==="wrong"||f.type==="wrong_tool");
  if (wrongFindings.length > 0) {
    box.appendChild(div("sec","⚠️ Wrong Tools for Your Industry"));
    wrongFindings.forEach(f => {
      const card = div("alert");
      card.style.cssText="background:rgba(255,80,80,0.06);border-color:rgba(255,80,80,0.2)";
      card.innerHTML=`<div class="alert-lbl" style="color:#ff9090">Replace This</div><div style="font-size:13px;color:#f0ece4;font-weight:500;margin-bottom:6px">${f.title}</div><div class="alert-msg">${f.msg}</div>`;
      if (f.save>0) {
        const sav = span("amber",`Est. $${f.save}/mo savings`);
        sav.style.cssText="display:inline-block;margin-top:8px;font-size:12px";
        card.appendChild(sav);
      }
      box.appendChild(card);
    });
  }

  // Redundancy overlaps
  box.appendChild(div("sec","🔴 Tool Overlaps"));
  const redundantFindings = (r.consultantFindings||[]).filter(f=>f.type==="redundant");
  if (!r.overlaps.length && !redundantFindings.length) {
    box.appendChild(div("no-issues","No major tool overlaps detected."));
  } else {
    redundantFindings.forEach(f => {
      const card = div("opp");
      card.innerHTML=`<div class="opp-row"><div class="opp-left"><span class="red">${f.title}</span></div><span class="amber">$${f.save}/mo</span></div><div class="opp-msg">${f.msg}</div>`;
      box.appendChild(card);
    });
    r.overlaps.forEach(o => {
      const ta = selectedTools.find(t=>t.toLowerCase().includes(o.a.toLowerCase()))||o.a;
      const tb = selectedTools.find(t=>t.toLowerCase().includes(o.b.toLowerCase()))||o.b;
      const card = div("opp");
      card.innerHTML=`<div class="opp-row"><div class="opp-left"><span class="red">Cut: ${tb}</span><span class="gray">→</span><span class="teal">Keep: ${ta}</span></div><span class="amber">$${o.save}/mo</span></div><div class="opp-msg">${o.msg}</div>`;
      box.appendChild(card);
    });
  }

  // AI Upgrades
  box.appendChild(div("sec","🤖 AI-Native Upgrades"));
  if (!r.upgrades.length) {
    box.appendChild(div("no-issues","Your stack already includes modern AI-native tools."));
  } else {
    r.upgrades.slice(0,3).forEach(u => {
      const card = div("opp");
      card.innerHTML=`<div class="opp-row"><div class="opp-left"><span class="red">Replace: ${u.tool}</span><span class="gray">→</span><span class="teal">${u.r}</span></div><span class="amber">$${u.save}/mo</span></div><div class="opp-msg">${u.why}</div>`;
      box.appendChild(card);
    });
  }

  // Missing tools (suggestions, not warnings)
  const missing = (r.consultantFindings||[]).filter(f=>f.type==="missing");
  if (missing.length > 0) {
    box.appendChild(div("sec","💡 Gaps Worth Filling"));
    missing.forEach(f => {
      const card = div("opp");
      card.style.cssText="background:rgba(78,205,196,0.04);border-color:rgba(78,205,196,0.15);border-radius:8px;padding:14px;margin-bottom:8px";
      card.innerHTML=`<div style="font-size:13px;color:#4ecdc4;font-weight:500;margin-bottom:4px">${f.title}</div><div class="opp-msg">${f.msg}</div>`;
      box.appendChild(card);
    });
  }

  // Savings
  box.appendChild(div("sec","💰 Estimated Savings"));
  const sb = div("sav-box");
  const m = div(null); m.innerHTML=`<div class="sav-val">$${r.totalSave.toLocaleString()}</div><div class="sav-lbl">Per Month</div>`;
  const y = div(null); y.innerHTML=`<div class="sav-val">$${(r.totalSave*12).toLocaleString()}</div><div class="sav-lbl">Per Year</div>`;
  sb.appendChild(m); sb.appendChild(y);
  box.appendChild(sb);

  // Dream stack for this industry
  if (r.blueprint && r.blueprint.dreamStack && Object.keys(r.blueprint.dreamStack).length) {
    box.appendChild(div("sec","🏆 Ideal Stack for Your Context"));
    const ds = div(null);
    ds.style.cssText="background:rgba(255,200,87,0.04);border:1px solid rgba(255,200,87,0.15);border-radius:8px;padding:16px";
    Object.entries(r.blueprint.dreamStack).forEach(([size, stack]) => {
      const row = div(null);
      row.style.cssText="margin-bottom:10px";
      row.innerHTML=`<div style="font-size:10px;color:#ffc857;letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px">${size} team</div><div style="font-size:13px;color:#c8c4bc;line-height:1.6">${stack}</div>`;
      ds.appendChild(row);
    });
    box.appendChild(ds);
  }

  // Action plan
  box.appendChild(div("sec","🎯 Priority Action Plan"));
  r.actions.slice(0,3).forEach((a,i)=>{
    const step = div("step");
    const n = div("step-n",(i+1)+"");
    const t = div("step-t");
    const tt = span("step-title", a.title); t.appendChild(tt); t.appendChild(txt(a.text));
    step.appendChild(n); step.appendChild(t);
    box.appendChild(step);
  });

  // Optimized stack
  box.appendChild(div("sec","✅ Your Optimized Stack"));
  const ot = div("opt-tags");
  r.optimized.forEach(t=>{const s=span("opt-tag",t);ot.appendChild(s);});
  box.appendChild(ot);

  box.scrollIntoView({behavior:"smooth",block:"start"});
}

// ── MAIN PAGE ─────────────────────────────────────────────────────────────────
function renderMain() {
  selectedTools=[]; selectedGoals=[];
  app().innerHTML="";
  const wrap = div("wrap");

  // Nav
  const nav = div("nav");
  const mb = el("button","nav-btn","📊 Metrics");
  mb.addEventListener("click", renderMetrics);
  nav.appendChild(mb); wrap.appendChild(nav);

  // Header
  const hdr = div("header");
  hdr.innerHTML=`<div class="badge"><div class="bdot"></div><span class="btxt">AI Stack Analyzer</span></div><h1>Stack<span class="accent">Swap</span></h1><p class="sub">Tell us what you use. We'll tell you what you don't need.</p>`;
  wrap.appendChild(hdr);

  // Step 1 — Tools
  const c1 = div("card");
  const h1 = div("card-hd"); h1.appendChild(sdot(1));
  const i1 = div(null); i1.innerHTML='<div class="ct">Your Current Stack</div><div class="cs">Type any tool and press Enter — add anything, even if it\'s not in the list</div>';
  h1.appendChild(i1); c1.appendChild(h1);
  // Tool input
  const toolRow = div("tool-row");
  const toolWrap = div("tool-wrap");
  const toolInput = el("input","field");
  toolInput.placeholder="e.g. HubSpot, Dotloop, Zapier...";
  toolInput.style.width="100%";
  const suggBox = div("sugg"); suggBox.id="sugg";
  const tagsDiv = div("tags"); tagsDiv.id="tags";
  const addBtn = el("button","add-btn","+ Add");

  function getSugg(v){
    if(v.length<2)return[];
    return getAllTools().filter(t=>t.toLowerCase().includes(v.toLowerCase())&&!selectedTools.includes(t)).slice(0,7);
  }
  function showSugg(items){
    suggBox.innerHTML="";
    if(!items.length){suggBox.classList.remove("show");return;}
    items.forEach(s=>{
      const d=div("si",s); d.addEventListener("mousedown",()=>doAdd(s)); suggBox.appendChild(d);
    });
    suggBox.appendChild(div("sh","Press Enter to add any tool not in the list"));
    suggBox.classList.add("show");
  }
  function renderTags(){
    tagsDiv.innerHTML="";
    selectedTools.forEach((t,i)=>{
      const tag=div("tag",t);
      const x=el("button","tag-x","×");
      x.addEventListener("click",()=>{selectedTools.splice(i,1);renderTags();updateCTA();markDot(1,selectedTools.length>0);});
      tag.appendChild(x); tagsDiv.appendChild(tag);
    });
  }
  function doAdd(name){
    const n=name.trim(); if(!n||selectedTools.includes(n)){toolInput.value="";suggBox.classList.remove("show");return;}
    selectedTools.push(n); toolInput.value=""; suggBox.classList.remove("show");
    if(!TOOLS.includes(n)&&!extraTools.includes(n)) extraTools.push(n);
    renderTags(); updateCTA(); markDot(1,selectedTools.length>0);
  }
  toolInput.addEventListener("input",()=>showSugg(getSugg(toolInput.value)));
  toolInput.addEventListener("keydown",e=>{if(e.key==="Enter"){e.preventDefault();doAdd(toolInput.value);}});
  toolInput.addEventListener("blur",()=>setTimeout(()=>suggBox.classList.remove("show"),150));
  addBtn.addEventListener("mousedown",e=>{e.preventDefault();doAdd(toolInput.value);});
  toolWrap.appendChild(toolInput); toolWrap.appendChild(suggBox);
  toolRow.appendChild(toolWrap); toolRow.appendChild(addBtn);
  c1.appendChild(toolRow); c1.appendChild(tagsDiv);
  wrap.appendChild(c1);

  // Step 2 — Context
  const c2 = div("card");
  const h2 = div("card-hd"); h2.appendChild(sdot(2));
  const i2 = div(null); i2.innerHTML='<div class="ct">Context <span style="color:#5a5650;font-weight:400">(Optional)</span></div><div class="cs">Sharper context = sharper analysis</div>';
  h2.appendChild(i2); c2.appendChild(h2);
  const g2 = div("g2");
  // Team size
  const tsW = div(null); tsW.innerHTML='<label class="lbl">Team Size</label>';
  const tsSel = el("select","field"); tsSel.id="ts";
  ["","1-5","6-15","16-50","51-200","200+"].forEach(v=>{const o=el("option",null,v||"Select...");o.value=v;tsSel.appendChild(o);});
  tsW.appendChild(tsSel); g2.appendChild(tsW);
  // Industry
  const indW = div(null); indW.innerHTML='<label class="lbl">Industry</label>';
  const indSel = el("select","field"); indSel.id="ind";
  INDUSTRIES.forEach(v=>{const o=el("option",null,v||"Select...");o.value=v;indSel.appendChild(o);});
  indW.appendChild(indSel); g2.appendChild(indW);
  c2.appendChild(g2);
  // Budget
  const budW = div(null); budW.innerHTML='<label class="lbl">Monthly SaaS Spend ($)</label>';
  const budIn = el("input","field"); budIn.type="text"; budIn.inputMode="numeric"; budIn.pattern="[0-9]*"; budIn.placeholder="e.g. 2500"; budIn.id="bud";
  budW.appendChild(budIn); c2.appendChild(budW);
  [tsSel,indSel].forEach(s=>s.addEventListener("change",()=>markDot(2,!!(tsSel.value||indSel.value))));
  wrap.appendChild(c2);

  // Step 3 — Goals
  const c3 = div("card");
  const h3 = div("card-hd"); h3.appendChild(sdot(3));
  const i3 = div(null); i3.innerHTML='<div class="ct">What\'s your goal?</div><div class="cs">Select all that apply</div>';
  h3.appendChild(i3); c3.appendChild(h3);
  const goalsDiv = div("goals");
  GOALS.forEach(g=>{
    const b=el("button","gc",g);
    b.addEventListener("click",()=>{
      const idx=selectedGoals.indexOf(g);
      if(idx>=0)selectedGoals.splice(idx,1);else selectedGoals.push(g);
      b.className="gc"+(selectedGoals.includes(g)?" on":"");
      markDot(3,selectedGoals.length>0);
    });
    goalsDiv.appendChild(b);
  });
  c3.appendChild(goalsDiv); wrap.appendChild(c3);

  // CTA
  const cta = el("button","cta","Add at least 2 tools to analyze");
  cta.id="cta"; cta.disabled=true;
  cta.addEventListener("click", async ()=>{
    if(selectedTools.length<2)return;
    cta.disabled=true;
    cta.innerHTML='<span class="spinner"></span>Analyzing...';
    await new Promise(r=>setTimeout(r,500));
    const result = runAnalysis(
      selectedTools,
      document.getElementById("ts")?.value||"",
      document.getElementById("ind")?.value||"",
      document.getElementById("bud")?.value||"",
      selectedGoals
    );
    renderResult(result);
    cta.disabled=false; cta.className="cta ready";
    cta.textContent="Re-analyze "+selectedTools.length+" Tools";
  });
  wrap.appendChild(cta);

  const rb = div("result"); rb.id="result-box";
  wrap.appendChild(rb);
  wrap.appendChild(div("footer",'<p>STACKSWAP — POWERED BY DEMANDSTACK</p>'));
  app().appendChild(wrap);
}

function updateCTA(){
  const b=document.getElementById("cta"); if(!b)return;
  const ok=selectedTools.length>=2;
  b.className="cta"+(ok?" ready":"");
  b.disabled=!ok;
  b.textContent=ok?`Analyze ${selectedTools.length} Tools`:"Add at least 2 tools to analyze";
}

// ── METRICS PAGE ──────────────────────────────────────────────────────────────
function renderMetrics(){
  app().innerHTML="";
  const wrap=div("mwrap");
  const back=el("button","back-btn","← Back");
  back.addEventListener("click",renderMain);
  wrap.appendChild(back);
  wrap.innerHTML+=`<div class="mh2">Swap <span style="color:#ffc857">Metrics</span></div><p style="color:#5a5650;font-size:13px;margin-top:4px;margin-bottom:4px">${sessionMetrics.count} analyses this session · $${sessionMetrics.totalSavings.toLocaleString()} savings identified</p>`;
  wrap.insertBefore(back,wrap.firstChild);

  if(sessionMetrics.count===0){
    wrap.innerHTML+=`<div class="card" style="text-align:center;padding:48px"><div style="font-size:32px;margin-bottom:12px">📊</div><div style="color:#5a5650;font-size:13px">No data yet. Run some analyses to populate metrics.</div></div>`;
  } else {
    const freq=arr=>{
      const m={};
      arr.forEach(t=>{m[t]=(m[t]||0)+1;});
      return Object.entries(m).sort((a,b)=>b[1]-a[1]).slice(0,10);
    };
    const makePanel=(title,items,color)=>{
      const card=div("card"); const max=items[0]?.[1]||1;
      card.innerHTML=`<div style="font-size:11px;color:#ffc857;letter-spacing:.12em;text-transform:uppercase;margin-bottom:18px">${title}</div>`;
      items.forEach(([name,count])=>{
        card.innerHTML+=`<div class="bar-row"><div class="bar-lbl"><span style="color:#d4d0c8">${name}</span><span style="color:${color};font-weight:600">${count}</span></div><div class="bar-track"><div class="bar-fill" style="width:${(count/max*100).toFixed(0)}%;background:${color}"></div></div></div>`;
      });
      return card;
    };
    const mg=div("mgrid");
    mg.appendChild(makePanel("🔴 Most Analyzed Tools",freq(sessionMetrics.from),"#ffc857"));
    mg.appendChild(makePanel("✅ Top Recommended Swaps",freq(sessionMetrics.recs),"#4ecdc4"));
    wrap.appendChild(mg);
  }
  wrap.appendChild(div("footer",'<p>STACKSWAP — POWERED BY DEMANDSTACK</p>'));
  app().appendChild(wrap);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
renderMain();
</script>
